<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balva — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #0F6E56;
      --green-l: #13896a;
      --green-d: #0a4f3e;
      --cream:   #F5F0E8;
      --gold:    #C9A84C;
      --white:   #FAFAF8;
    }

    html, body {
      height: 100%;
      background: var(--green-d);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── animated radial glow ── */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(19,137,106,0.45) 0%, transparent 70%);
      top: -100px; left: -150px;
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 18s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px, 80px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-50px,-60px); } }

    /* ── thin horizontal rule decoration ── */
    .rule {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(245,240,232,0.12) 30%, rgba(201,168,76,0.3) 50%, rgba(245,240,232,0.12) 70%, transparent 100%);
    }
    .rule-top    { top: 48px; }
    .rule-bottom { bottom: 48px; }

    /* ── corner marks ── */
    .corner {
      position: fixed;
      width: 18px; height: 18px;
      border-color: rgba(201,168,76,0.5);
      border-style: solid;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 1s;
    }
    .corner-tl { top: 28px;    left: 28px;   border-width: 1px 0 0 1px; }
    .corner-tr { top: 28px;    right: 28px;  border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 28px; left: 28px;   border-width: 0 0 1px 1px; }
    .corner-br { bottom: 28px; right: 28px;  border-width: 0 1px 1px 0; }

    /* ── main layout ── */
    .stage {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 24px;
      text-align: center;
    }

    /* ── label ── */
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.9s ease forwards;
      animation-delay: 0.2s;
    }

    /* ── wordmark ── */
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(96px, 18vw, 176px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--cream);
      position: relative;
      display: inline-block;
      margin: 18px 0 4px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 1.1s cubic-bezier(0.16,1,0.3,1) forwards;
      animation-delay: 0.45s;
    }
    /* subtle text shadow depth */
    .wordmark span {
      position: relative;
      display: inline-block;
    }
    .wordmark span::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: var(--gold);
      opacity: 0.12;
      transform: translate(2px, 3px);
      z-index: -1;
      pointer-events: none;
    }

    /* ── dot accent ── */
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      margin-left: 4px;
      vertical-align: super;
      position: relative; top: -8px;
      opacity: 0;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      animation-delay: 1.3s;
    }

    /* ── tagline ── */
    .tagline-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0 0;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.9s ease forwards;
      animation-delay: 0.85s;
    }
    .line { flex: 1; height: 1px; background: rgba(245,240,232,0.2); min-width: 40px; max-width: 80px; }
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(18px, 2.5vw, 24px);
      letter-spacing: 0.04em;
      color: rgba(245,240,232,0.75);
    }

    /* ── full name ── */
    .fullname {
      font-family: 'DM Mono', monospace;
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      margin-top: 10px;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.1s;
    }

    /* ── divider ── */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(180deg, rgba(201,168,76,0.5) 0%, transparent 100%);
      margin: 40px auto 0;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.4s;
    }

    /* ── status pill ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      padding: 8px 20px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 100px;
      background: rgba(15,110,86,0.25);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(6px);
      animation: rise 0.8s ease forwards;
      animation-delay: 1.6s;
    }
    .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      position: relative;
    }
    .pulse::before {
      content: '';
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      opacity: 0;
      animation: ripple 2.2s ease-out infinite;
    }
    @keyframes ripple {
      0%   { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .status-text {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.6);
    }

    /* ── footer note ── */
    .footer-note {
      position: fixed;
      bottom: 36px;
      left: 50%; transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.25);
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 2s;
    }

    /* ── keyframes ── */
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes pop {
      to { opacity: 1; }
    }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .rule-top    { top: 32px; }
      .rule-bottom { bottom: 32px; }
      .corner-tl, .corner-tr { top: 16px; }
      .corner-bl, .corner-br { bottom: 16px; }
      .corner-tl, .corner-bl { left: 16px; }
      .corner-tr, .corner-br { right: 16px; }
    }
  </style>
</head>
<body>

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="rule rule-top"></div>
  <div class="rule rule-bottom"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <main class="stage">
    <p class="label">balva.ai</p>

    <h1 class="wordmark">
      <span data-text="Balva">Balva</span><span class="dot"></span>
    </h1>

    <div class="tagline-wrap">
      <div class="line"></div>
      <p class="tagline">Every customer, answered.</p>
      <div class="line"></div>
    </div>

    <p class="fullname">Business Automation Live Virtual Assistant</p>

    <div class="divider"></div>

    <div class="status">
      <span class="pulse"></span>
      <span class="status-text">Something great is coming soon</span>
    </div>
  </main>

  <p class="footer-note">© 2025 Balva AI &nbsp;·&nbsp; balva.ai</p>

</body>
</html>
